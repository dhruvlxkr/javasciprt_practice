<!DOCTYPE html>
<html lang="en">
<head>

    <title>Function Practise</title>
</head>
<body>
    
    <script>
    function Celcius(celNum){
       f = (9/5)*celNum + 32;
       document.write(f);
    }
    Celcius(100);

    </script>
