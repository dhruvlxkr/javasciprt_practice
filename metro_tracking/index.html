<!--Give Discount on age gender for metro ticket female 50% off , kids under 5 year of age are free, kids up to 8 years have half ticket people over 65 year of age only pay 30% of the ticket in case of multiple discount max dicount will applly-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metro Tracking</title>
</head>
<body>
    
<script>
    let age = 45;
    let gender = 'female';
    let finalDiscount;

    if(age === 5){
        finalDiscount = 100;
    }else if(age === 8){
       finalDiscount = 50;
    }else if(age === 65){
       finalDiscount = 30;
    }
    if(gender == 'female'){
        finalDiscount = 50;
    }
</script>
</body>
</html>
